advanced:
  # Relative paths are resolved from this config file's directory.
  lcp: ./tools/LCP/build/bin/lcp

  # Optional field-specific bounds override --abs-eb/--rel-eb when set.
  abs_eb: null
  rel_eb: 1e-3
  pos_abs_eb: null
  pos_rel_eb: null
  vel_abs_eb: null
  vel_rel_eb: null
  # 0 disables velocity LCP chunking. This only applies when both triplets use LCP.
  vel_chunk_size: 0
  # 0 selects up to 16 workers automatically for chunked velocity LCP.
  vel_chunk_workers: 0
  id_abs_eb: 0.0
  # SZO reconstructs integer streams exactly when its absolute bound is below 1.
  szo_abs_eb: 0.5
  pos_compressor: lcp
  vel_compressor: sz3
  lossless: pcodec

  # Integer position conversion used before LCP compression.
  position_scale: auto
  position_scale_attr: bitwidth
  position_scale_value: null
