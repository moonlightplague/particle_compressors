advanced:
  # Relative paths are resolved from this config file's directory.
  lcp: ./tools/LCP/build/bin/lcp

  # Optional field-specific bounds override --abs-eb/--rel-eb when set.
  pos_abs_eb: null
  pos_rel_eb: null
  vel_abs_eb: null
  vel_rel_eb: null
  id_abs_eb: 0.0

  # Integer position conversion used before LCP compression.
  position_scale: auto
  position_scale_attr: bitwidth
  position_scale_value: null
